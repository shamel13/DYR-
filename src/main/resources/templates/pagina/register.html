<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - DYR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 font-sans">

  <!-- NAVBAR -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a th:href="@{/pagina/index}" class="text-2xl font-bold flex items-center gap-2 text-gray-800">
        <i class="fa-solid fa-shirt text-red-500"></i> DYR
      </a>
      <nav class="flex-1 flex justify-center gap-10">
        <a th:href="@{/pagina/index}" class="text-gray-700 hover:text-red-500 transition">Inicio</a>
        <a th:href="@{/pagina/acerca}" class="text-gray-700 hover:text-red-500 transition">Acerca de</a>
        <a th:href="@{/pagina/catalogo}" class="text-gray-700 hover:text-red-500 transition">Productos</a>
        <a th:href="@{/auth/login}" class="text-gray-700 hover:text-red-500 transition">Iniciar sesión</a>
      </nav>
    </div>
  </header>

  <!-- REGISTER FORM -->
  <section class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center mb-6">Crear Cuenta</h2>

      <form th:action="@{/auth/register}" method="post" th:object="${usuario}" class="space-y-4">
        <div>
          <label class="block text-gray-700">Nombre</label>
          <input type="text" th:field="*{nombre}" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"/>
        </div>
        <div>
          <label class="block text-gray-700">Email</label>
          <input type="email" th:field="*{email}" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"/>
        </div>
        <div>
          <label class="block text-gray-700">Contraseña</label>
          <input type="password" th:field="*{password}" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"/>
        </div>
        <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded font-medium transition">
          Registrarse
        </button>
      </form>

      <p class="text-center text-sm text-gray-600 mt-4">
        ¿Ya tienes cuenta? <a th:href="@{/auth/login}" class="text-red-500 hover:underline">Inicia sesión aquí</a>
      </p>
    </div>
  </section>

</body>
</html>
