<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil - DYR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50">

  <!-- NAVBAR -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex flex-wrap items-center justify-between">
      <!-- Logo -->
      <a th:href="@{/pagina/index}" class="text-2xl font-bold text-red-500 flex items-center gap-2">
        <i class="fas fa-tshirt"></i>
        <span>DYR</span>
      </a>

      <!-- Menú móvil toggle -->
      <button id="menu-toggle" class="md:hidden text-gray-800 focus:outline-none">
        <i class="fas fa-bars text-xl"></i>
      </button>

      <!-- Menú desktop -->
      <ul id="menu" class="hidden md:flex items-center space-x-6 text-gray-700 font-medium">
        <li><a th:href="@{/pagina/index}" class="hover:text-red-500 transition">Inicio</a></li>
        <li><a th:href="@{/pagina/catalogo}" class="hover:text-red-500 transition">Catálogo</a></li>
        <li><a th:href="@{/pagina/acerca}" class="hover:text-red-500 transition">Acerca</a></li>

        <!-- Si NO hay sesión iniciada -->
        <li th:if="${currentUserName == null}">
          <a th:href="@{/auth/login}" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full transition">
            Iniciar sesión
          </a>
        </li>

        <!-- Si SÍ hay sesión iniciada -->
        <li th:if="${currentUserName != null}" class="relative group">
          <button class="flex items-center space-x-2 text-gray-800 hover:text-red-500 transition">
            <div class="w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center font-bold">
              <span th:text="${#strings.substring(currentUserName, 0, 1).toUpperCase()}">U</span>
            </div>
            <span class="hidden lg:inline" th:text="${currentUserName}">Usuario</span>
            <i class="fas fa-chevron-down text-sm"></i>
          </button>
          <ul class="absolute right-0 top-full pt-2 w-48 bg-white shadow-lg rounded-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
            <li>
              <a th:href="@{/auth/profile}" class="block px-4 py-2 text-gray-800 hover:bg-red-50 hover:text-red-500 transition">
                <i class="fas fa-user mr-2"></i> Perfil
              </a>
            </li>
            <li>
              <button th:onclick="'window.location.href=\'/auth/logout\''" class="w-full text-left block px-4 py-2 text-gray-800 hover:bg-red-50 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>

    <!-- Menú móvil desplegable -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200 mt-2 py-4 px-6 space-y-4 text-gray-700 font-medium">
      <a th:href="@{/pagina/index}" class="block hover:text-red-500 transition">Inicio</a>
      <a th:href="@{/pagina/catalogo}" class="block hover:text-red-500 transition">Catálogo</a>
      <a th:href="@{/pagina/acerca}" class="block hover:text-red-500 transition">Acerca</a>

      <div th:if="${currentUserName == null}">
        <a th:href="@{/auth/login}" class="block bg-red-500 hover:bg-red-600 text-white text-center px-5 py-2 rounded-full transition">
          Iniciar sesión
        </a>
      </div>

      <div th:if="${currentUserName != null}" class="space-y-2">
        <p class="text-gray-500 text-sm" th:text="'Hola, ' + ${currentUserName}">Hola, Usuario</p>
        <a th:href="@{/auth/profile}" class="block hover:text-red-500 transition"><i class="fas fa-user mr-2"></i> Perfil</a>
        <button th:onclick="'window.location.href=\'/auth/logout\''" class="w-full text-left hover:text-red-500 transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
        </button>
      </div>
    </div>
  </nav>

  <script>
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('mobile-menu');
    toggle.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>

  <section class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-2xl">
      <h2 class="text-2xl font-bold text-center mb-6">Mi Perfil</h2>

      <form th:action="@{/auth/profile}" th:object="${usuario}" method="post" class="space-y-6">
        <input type="hidden" th:field="*{id}" />

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-white p-4 rounded-lg shadow">
            <h3 class="text-lg font-semibold mb-3">Información personal</h3>
            <div class="space-y-3">
              <div>
                <label class="block text-gray-700 text-sm">Nombre completo</label>
                <input type="text" th:field="*{name}" class="w-full border rounded px-3 py-2"/>
              </div>
              <div>
                <label class="block text-gray-700 text-sm">Email</label>
                <input type="email" th:field="*{email}" class="w-full border rounded px-3 py-2"/>
              </div>
              <div>
                <label class="block text-gray-700 text-sm">Teléfono</label>
                <input type="text" th:field="*{phone}" class="w-full border rounded px-3 py-2"/>
              </div>
              <div>
                <label class="block text-gray-700 text-sm">Tipo de documento</label>
                <select th:field="*{documentType}" class="w-full border rounded px-3 py-2">
                  <option value="CEDULA_CIUDADANIA">Cédula de ciudadanía (CC)</option>
                  <option value="CEDULA_EXTRANJERIA">Cédula de extranjería (CE)</option>
                  <option value="PASAPORTE">Pasaporte</option>
                  <option value="REGISTRO_CIVIL">Registro civil</option>
                  <option value="NIT">NIT</option>
                </select>
              </div>
              <div>
                <label class="block text-gray-700 text-sm">Número de documento</label>
                <input type="text" th:field="*{documentNumber}" class="w-full border rounded px-3 py-2"/>
              </div>
              <div>
                <label class="block text-gray-700 text-sm">Nueva contraseña (dejar en blanco para no cambiar)</label>
                <input type="password" th:field="*{password}" class="w-full border rounded px-3 py-2"/>
              </div>
            </div>
          </div>

          <div class="bg-white p-4 rounded-lg shadow">
            <h3 class="text-lg font-semibold mb-3">Dirección Personal</h3>
            <div class="space-y-3">
              <div>
                <label class="block text-gray-700 text-sm">Dirección</label>
                <input type="text" th:field="*{address}" placeholder="Calle, número, apto" class="w-full border rounded px-3 py-2"/>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-gray-700 text-sm">Barrio</label>
                  <input type="text" th:field="*{neighborhood}" placeholder="Barrio" class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                  <label class="block text-gray-700 text-sm">Ciudad</label>
                  <input type="text" th:field="*{city}" placeholder="Ciudad" class="w-full border rounded px-3 py-2"/>
                </div>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-gray-700 text-sm">Código Postal</label>
                  <input type="text" th:field="*{postalCode}" placeholder="Código Postal" class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                  <label class="block text-gray-700 text-sm">País</label>
                  <input type="text" th:field="*{country}" placeholder="País" class="w-full border rounded px-3 py-2"/>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3">
          <a th:href="@{/pagina/index}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-4 rounded">Cancelar</a>
          <button type="submit" class="bg-red-500 hover:bg-red-600 text-white py-2 px-6 rounded">Guardar cambios</button>
        </div>
      </form>
    </div>
  </section>

</body>
</html>

<script>
  // Toggle display of alternate address
  document.addEventListener('DOMContentLoaded', function(){
    const toggle = document.getElementById('toggleAlt');
    const alt = document.getElementById('altSection');
    if(!toggle || !alt) return;
    toggle.addEventListener('click', () => {
      alt.classList.toggle('hidden');
    });
    // show alt if any alt field has value
    const altInputs = alt.querySelectorAll('input');
    let hasValue = false;
    altInputs.forEach(i => { if(i && i.value && i.value.trim() !== '') hasValue = true; });
    if(hasValue) alt.classList.remove('hidden');
  });
</script>
