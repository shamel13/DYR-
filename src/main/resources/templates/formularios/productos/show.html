<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Producto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div class="max-w-4xl mx-auto py-10 px-4">
    <div class="mb-6">
      <a th:href="@{/productos}" 
         class="px-4 py-2 bg-green-500 text-white rounded-lg shadow hover:bg-green-600 transition">
        ← Volver al listado
      </a>
    </div>

    <h1 class="text-3xl font-bold text-green-600 mb-6">
      Detalle del Producto: <span th:text="${producto.nombre}"></span>
    </h1>

    <div class="bg-white shadow rounded p-6 space-y-4">
      <p><strong>Nombre:</strong> <span th:text="${producto.nombre}"></span></p>
      <p><strong>Descripción:</strong> 
        <span th:text="${producto.descripcion != null ? producto.descripcion : 'Sin descripción'}"></span>
      </p>
      <p><strong>Precio:</strong> 
        <span th:text="'$' + ${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}"></span>
      </p>
      <p><strong>Cantidad:</strong> <span th:text="${producto.cantidad}"></span></p>
      <p><strong>Fecha de creación:</strong> 
        <span th:text="${#temporals.format(producto.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
      </p>
    </div>
  </div>
</body>
</html>
