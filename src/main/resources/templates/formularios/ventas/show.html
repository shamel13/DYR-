<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalle de la Venta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-6">
    <a th:href="@{/ventas}" class="px-4 py-2 bg-red-500 text-white rounded-lg shadow hover:bg-red-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-3xl font-bold text-red-600 mb-6">
    Detalle de la Venta #<span th:text="${venta.id}"></span>
  </h1>

  <div class="bg-white shadow rounded p-6 space-y-4">
    <p><strong>Pedido asociado:</strong> Pedido #<span th:text="${venta.pedido.id}"></span></p>
    <p><strong>Cliente:</strong> <span th:text="${venta.pedido.cliente.nombre}"></span></p>
    <p><strong>Producto:</strong> <span th:text="${venta.pedido.producto.nombre}"></span></p>
    <p><strong>Fecha de Venta:</strong> 
       <span th:text="${#temporals.format(venta.fechaVenta,'dd/MM/yyyy')}"></span>
    </p>
  </div>
</div>
</body>
</html>
