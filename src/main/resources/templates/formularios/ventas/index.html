<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ventas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="mb-6">
  <a th:href="@{/dashboard/home}" 
     class="inline-flex items-center px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">
    ← Volver
  </a>
</div>

<h1 class="text-2xl font-bold mb-4">Gestión de Ventas</h1>

<div th:if="${success}" class="bg-green-100 text-green-700 p-3 rounded mb-4" th:text="${success}"></div>

<div th:if="${#fields.hasErrors('*')}" class="bg-red-100 text-red-700 p-3 rounded mb-4">
  <strong>Se encontraron errores en el formulario:</strong>
  <ul class="list-disc pl-5">
    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
  </ul>
</div>

<!-- Formulario -->
<form th:action="@{/ventas}" method="post" class="bg-white p-4 rounded shadow mb-6">
  <div class="grid grid-cols-2 gap-4">
    <select name="pedido.id" class="border p-2 rounded" required>
      <option value="">Seleccione pedido</option>
      <option th:each="p : ${pedidos}" th:value="${p.id}" 
              th:text="'Pedido #' + ${p.id} + ' - Cliente: ' + ${p.cliente.nombre}"></option>
    </select>
    <input type="date" name="fechaVenta" class="border p-2 rounded" required>
  </div>
  <button type="submit" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Registrar</button>
</form>

<!-- Listado -->
<table class="w-full bg-white shadow rounded">
  <thead>
    <tr class="bg-gray-200 text-left">
      <th class="p-2">ID</th>
      <th class="p-2">Pedido</th>
      <th class="p-2">Fecha</th>
      <th class="p-2">Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="v : ${ventas}" class="border-t">
      <td class="p-2" th:text="${v.id}"></td>
      <td class="p-2" th:text="'Pedido #' + ${v.pedido.id}"></td>
      <td class="p-2" th:text="${#temporals.format(v.fechaVenta,'dd/MM/yyyy')}"></td>
      <td class="p-2">
        <a th:href="@{/ventas/{id}/edit(id=${v.id})}" class="text-blue-500">Editar</a> |
        <form th:action="@{/ventas/{id}(id=${v.id})}" method="post" class="inline">
          <input type="hidden" name="_method" value="delete"/>
          <button onclick="return confirm('¿Eliminar venta?')" class="text-red-500">Eliminar</button>
        </form>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
