<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ventas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="mb-6">
  <a th:href="@{/dashboard/home}" 
     class="inline-flex items-center px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">
    ← Volver
  </a>
</div>

<h1 class="text-2xl font-bold mb-4">Resumen de Ventas</h1>

<div th:if="${success}" class="bg-green-100 text-green-700 p-3 rounded mb-4" th:text="${success}"></div>

<!-- Resumen de Estadísticas -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
  <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-lg shadow-lg">
    <div class="text-3xl font-bold" th:text="${#lists.size(ventas)}">0</div>
    <div class="text-sm opacity-90">Total de Ventas</div>
  </div>
  <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-lg shadow-lg">
    <div class="text-3xl font-bold" th:text="'$' + ${#numbers.formatDecimal(#lists.isEmpty(ventas) ? 0 : #aggregates.sum(ventas.![total]), 1, 'COMMA', 2, 'POINT')}">$0</div>
    <div class="text-sm opacity-90">Ingresos Totales</div>
  </div>
  <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-6 rounded-lg shadow-lg">
    <div class="text-3xl font-bold" th:text="${#lists.isEmpty(ventas) ? 0 : #aggregates.sum(ventas.![cantidad])}">0</div>
    <div class="text-sm opacity-90">Productos Vendidos</div>
  </div>
  <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-6 rounded-lg shadow-lg">
    <div class="text-3xl font-bold" th:text="'$' + ${#numbers.formatDecimal(#lists.isEmpty(ventas) ? 0 : (#aggregates.sum(ventas.![total]) / #lists.size(ventas)), 1, 'COMMA', 2, 'POINT')}">$0</div>
    <div class="text-sm opacity-90">Venta Promedio</div>
  </div>
</div>

<!-- Listado -->
<div class="bg-white shadow rounded overflow-hidden">
  <div class="p-4 bg-gray-50 border-b">
    <h2 class="text-lg font-semibold">Historial de Ventas</h2>
  </div>
  <div th:if="${#lists.isEmpty(ventas)}" class="p-8 text-center text-gray-500">
    <div class="text-4xl mb-2">📊</div>
    <div>No hay ventas registradas</div>
  </div>
  <table th:if="${!#lists.isEmpty(ventas)}" class="w-full">
    <thead>
      <tr class="bg-gray-100 text-left text-sm">
        <th class="p-3">ID</th>
        <th class="p-3">Cliente</th>
        <th class="p-3">Producto</th>
        <th class="p-3">Cantidad</th>
        <th class="p-3">Total</th>
        <th class="p-3">Fecha</th>
        <th class="p-3">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="v : ${ventas}" class="border-t hover:bg-gray-50">
        <td class="p-3 font-medium" th:text="${v.id}"></td>
        <td class="p-3" th:text="${v.cliente != null ? v.cliente.nombre : 'N/A'}"></td>
        <td class="p-3" th:text="${v.producto != null ? v.producto.nombre : 'N/A'}"></td>
        <td class="p-3" th:text="${v.cantidad}"></td>
        <td class="p-3 font-semibold text-green-600" th:text="'$' + ${#numbers.formatDecimal(v.total,1,'COMMA',2,'POINT')}"></td>
        <td class="p-3 text-gray-600" th:text="${#temporals.format(v.fechaVenta,'dd/MM/yyyy')}"></td>
        <td class="p-3">
          <div class="flex gap-2">
            <a th:href="@{/ventas/{id}(id=${v.id})}" class="text-blue-500 hover:text-blue-700" title="Ver detalles">👁️</a>
            <form th:action="@{/ventas/{id}/delete(id=${v.id})}" method="post" class="inline" onsubmit="return confirm('¿Eliminar esta venta?');">
              <button type="submit" class="text-red-500 hover:text-red-700" title="Eliminar">🗑️</button>
            </form>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
