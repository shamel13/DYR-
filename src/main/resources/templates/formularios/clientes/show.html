<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-6">
    <a th:href="@{/clientes}" class="px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-3xl font-bold text-blue-600 mb-6">
    Detalle del Cliente: <span th:text="${cliente.nombre}"></span>
  </h1>

  <div class="bg-white shadow rounded p-6 space-y-4">
    <p><strong>Email:</strong> <span th:text="${cliente.email} ?: 'No registrado'"></span></p>
    <p><strong>Teléfono:</strong> <span th:text="${cliente.telefono} ?: 'No registrado'"></span></p>
    <p><strong>Dirección:</strong> <span th:text="${cliente.direccion} ?: 'No registrada'"></span></p>
    <p><strong>Ciudad:</strong> <span th:text="${cliente.ciudad} ?: 'No registrada'"></span></p>
    <p><strong>Fecha Registro:</strong> 
       <span th:text="${#temporals.format(cliente.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
    </p>
  </div>

  <h2 class="text-2xl font-semibold text-gray-700 mt-8 mb-4">Historial de Pedidos</h2>
<div class="bg-white shadow rounded p-6">
  <div th:if="${#lists.isEmpty(pedidos)}">
    <p class="text-gray-500">Este cliente aún no tiene pedidos.</p>
  </div>
  <ul th:if="${!#lists.isEmpty(pedidos)}" class="divide-y divide-gray-200">
    <li th:each="pedido : ${pedidos}" class="py-2 flex justify-between">
      <span>
        Pedido #<span th:text="${pedido.id}"></span> -
        <span th:text="${pedido.nombrePedido}"></span>
      </span>
      <span class="text-purple-600 font-bold"
            th:text="'$' + ${#numbers.formatDecimal(pedido.valorTotal, 1, 'COMMA', 2, 'POINT')}">
      </span>
    </li>
  </ul>
</div>
</div>
</body>
