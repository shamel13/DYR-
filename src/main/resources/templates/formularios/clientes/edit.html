<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-3xl mx-auto py-10 px-4">
  <!-- Botón volver -->
  <div class="mb-6">
    <a th:href="@{/clientes}" 
       class="inline-flex items-center px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-2xl font-bold text-blue-600 mb-6">Editar Cliente</h1>

  <!-- Alerta de validación -->
  <div th:if="${#fields.hasErrors('*')}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
    <strong>⚠️ No se pudo actualizar la información:</strong>
    <ul class="list-disc pl-5 mt-2">
      <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
    </ul>
  </div>

  <form th:action="@{/clientes/{id}(id=${cliente.id})}" method="post" th:object="${cliente}" class="bg-white p-6 rounded shadow">
    <input type="hidden" name="_method" value="put"/>
    <div class="mb-4">
      <label class="block text-sm font-medium">Nombre</label>
      <input type="text" th:field="*{nombre}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300" required>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Correo electrónico</label>
      <input type="email" th:field="*{email}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Teléfono</label>
      <input type="text" th:field="*{telefono}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Dirección</label>
      <input type="text" th:field="*{direccion}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Ciudad</label>
      <input type="text" th:field="*{ciudad}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="text-right">
      <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded">
        Guardar cambios
      </button>
    </div>
  </form>
</div>
</body>
</html>
