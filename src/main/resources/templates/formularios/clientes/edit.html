<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-3xl mx-auto py-10 px-4">
  <!-- Botón volver -->
  <div class="mb-6">
    <a th:href="@{/clientes}" 
       class="inline-flex items-center px-4 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-2xl font-bold text-blue-600 mb-6">Editar Cliente</h1>

  <!-- Alerta de validación -->
  <div th:if="${success}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
    <strong>✅ Actualizado correctamente</strong>
  </div>

  <form th:action="@{/clientes/{id}(id=${cliente.id})}" method="post" class="bg-white p-6 rounded shadow">
    <div class="mb-4">
      <label class="block text-sm font-medium">Nombre</label>
      <input type="text" name="nombre" th:value="${cliente.nombre}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300" required>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Correo electrónico</label>
      <input type="email" name="email" th:value="${cliente.email}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Teléfono</label>
      <input type="text" name="telefono" th:value="${cliente.telefono}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Dirección</label>
      <input type="text" name="direccion" th:value="${cliente.direccion}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium">Ciudad</label>
      <input type="text" name="ciudad" th:value="${cliente.ciudad}" class="w-full border rounded p-2 focus:ring focus:ring-blue-300">
    </div>
    <div class="text-right space-x-2">
      <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded">
        Guardar cambios
      </button>
      <a th:href="@{/clientes/{id}(id=${cliente.id})}" class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 inline-block">
        Ver detalle
      </a>
      <form th:action="@{/clientes/{id}/delete(id=${cliente.id})}" method="post" class="inline" onsubmit="return confirm('¿Eliminar cliente?');">
        <button type="submit" class="px-6 py-2 bg-red-500 text-white rounded hover:bg-red-600">
          Eliminar
        </button>
      </form>
    </div>
  </form>
</div>
</body>
</html>
