<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clientes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="mb-6">
  <a th:href="@{/dashboard/home}" 
     class="inline-flex items-center px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">
    ← Volver
  </a>
</div>

<h1 class="text-2xl font-bold mb-4">Gestión de Clientes</h1>

<!-- Alertas -->
<div th:if="${success}" class="bg-green-100 text-green-700 p-3 rounded mb-4" th:text="${success}"></div>
<div th:if="${#fields.hasErrors('*')}" class="bg-red-100 text-red-700 p-3 rounded mb-4">
  <strong>Se encontraron errores en el formulario:</strong>
  <ul class="list-disc pl-5">
    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
  </ul>
</div>

<!-- Formulario -->
<form th:action="@{/clientes}" method="post" th:object="${cliente}" class="bg-white p-4 rounded shadow mb-6">
  <div class="grid grid-cols-2 gap-4">
    <input th:field="*{nombre}" placeholder="Nombre" class="border p-2 rounded" required>
    <input th:field="*{email}" placeholder="Correo electrónico" type="email" class="border p-2 rounded">
    <input th:field="*{telefono}" placeholder="Teléfono" class="border p-2 rounded">
    <input th:field="*{direccion}" placeholder="Dirección" class="border p-2 rounded">
    <input th:field="*{ciudad}" placeholder="Ciudad" class="border p-2 rounded">
  </div>
  <button type="submit" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Registrar</button>
</form>

<!-- Listado -->
<table class="w-full bg-white shadow rounded">
  <thead>
    <tr class="bg-gray-200 text-left">
      <th class="p-2">ID</th>
      <th class="p-2">Nombre</th>
      <th class="p-2">Email</th>
      <th class="p-2">Teléfono</th>
      <th class="p-2">Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="c : ${clientes}" class="border-t">
      <td class="p-2" th:text="${c.id}"></td>
      <td class="p-2" th:text="${c.nombre}"></td>
      <td class="p-2" th:text="${c.email}"></td>
      <td class="p-2" th:text="${c.telefono}"></td>
      <td class="p-2">
        <a th:href="@{/clientes/{id}/edit(id=${c.id})}" class="text-blue-500">Editar</a> |
        <a th:href="@{/clientes/{id}(id=${c.id})}" class="text-green-500">Historial</a> |
        <form th:action="@{/clientes/{id}(id=${c.id})}" method="post" class="inline">
          <input type="hidden" name="_method" value="delete"/>
          <button onclick="return confirm('¿Eliminar cliente?')" class="text-red-500">Eliminar</button>
        </form>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
