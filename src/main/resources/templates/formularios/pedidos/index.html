<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="mb-6">
  <a th:href="@{/dashboard/home}" 
     class="inline-flex items-center px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">
    ← Volver
  </a>
</div>

<div class="max-w-6xl mx-auto py-10 px-4">
  <h1 class="text-3xl font-bold text-red-600 mb-6">Gestión de Pedidos</h1>

  <!-- Formulario -->
  <form th:action="@{/pedidos}" method="post" class="bg-white p-6 rounded shadow mb-8">
    <div class="grid md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium">Cliente</label>
        <select name="clienteId" class="input-field" required>
          <option value="">Seleccione un cliente</option>
          <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombre}"></option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">Usuario (Vendedor)</label>
        <select name="userId" class="input-field" required>
          <option value="">Seleccione un usuario</option>
          <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name}"></option>
        </select>
      </div>
    </div>

    <div class="mt-6">
      <label class="block text-sm font-medium mb-2">Productos</label>
      <div id="productos-container">
        <div class="flex gap-3 mb-2">
          <select name="productos[]" class="input-field w-1/2" required>
            <option value="">Seleccione un producto</option>
            <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre + ' - $' + p.precio}"></option>
          </select>
          <input type="number" name="cantidades[]" min="1" value="1" class="input-field w-1/2" required>
        </div>
      </div>
      <button type="button" onclick="agregarProducto()" class="mt-2 px-3 py-1 bg-green-500 text-white rounded">+ Añadir otro producto</button>
    </div>

    <div class="text-right mt-6">
      <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded">Guardar Pedido</button>
    </div>
  </form>

  <!-- Listado -->
  <h2 class="text-2xl font-bold mb-4">Listado de Pedidos</h2>
  <table class="w-full bg-white rounded shadow">
    <thead>
      <tr class="bg-gray-200">
        <th class="px-4 py-2">ID</th>
        <th class="px-4 py-2">Cliente</th>
        <th class="px-4 py-2">Usuario</th>
        <th class="px-4 py-2">Total</th>
        <th class="px-4 py-2">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="pedido : ${pedidos}" class="border-b">
        <td class="px-4 py-2" th:text="${pedido.id}"></td>
        <td class="px-4 py-2" th:text="${pedido.cliente.nombre}"></td>
        <td class="px-4 py-2" th:text="${pedido.user.name}"></td>
        <td class="px-4 py-2" th:text="'$' + ${pedido.valorTotal}"></td>
        <td class="px-4 py-2 flex gap-3">
          <a th:href="@{/pedidos/{id}(id=${pedido.id})}" class="text-blue-600 hover:underline">Ver</a>
          <a th:href="@{/pedidos/{id}/edit(id=${pedido.id})}" class="text-yellow-600 hover:underline">Editar</a>
          <form th:action="@{/pedidos/{id}(id=${pedido.id})}" method="post" onsubmit="return confirm('¿Eliminar este pedido?')">
            <input type="hidden" name="_method" value="delete"/>
            <button type="submit" class="text-red-600 hover:underline">Eliminar</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<style>
  .input-field { margin-top:0.25rem; width:100%; border:1px solid #d1d5db; border-radius:0.5rem; padding:0.5rem 1rem; outline:none; }
  .input-field:focus { border-color:#fb923c; box-shadow:0 0 0 2px rgba(251,146,60,0.3); }
</style>

<script>
  function agregarProducto() {
    const container = document.getElementById('productos-container');
    const div = document.createElement('div');
    div.classList.add('flex','gap-3','mb-2');
    div.innerHTML = `
      <select name="productos[]" class="input-field w-1/2" required>
        <option value="">Seleccione un producto</option>
        <!-- Thymeleaf iteration -->
        <option th:each="p : ${productos}" th:value="\${p.id}" th:text="\${p.nombre + ' - $' + p.precio}"></option>
      </select>
      <input type="number" name="cantidades[]" min="1" value="1" class="input-field w-1/2" required>
    `;
    container.appendChild(div);
  }
</script>
</body>
</html>
