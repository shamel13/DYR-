<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Pedido</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-6">
    <a href="/pedidos" 
       class="inline-flex items-center px-4 py-2 bg-purple-500 text-white rounded-lg shadow hover:bg-purple-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-3xl font-bold text-purple-600 mb-6">Editar Pedido</h1>

  {% if success %}
  <div class="mb-4 p-3 bg-green-100 text-green-700 rounded">
    <strong>✅ Pedido actualizado</strong>
  </div>
  {% endif %}

    <form action="/pedidos/{{ pedido.id }}/edit/" method="post" 
      class="grid md:grid-cols-2 gap-6 bg-white p-6 rounded shadow">
      {% csrf_token %}

    <div>
      <label class="block text-sm font-medium">Cliente</label>
      <input type="text" value="{{ pedido.cliente.nombre }}" class="input-field" readonly>
    </div>

    <div>
      <label class="block text-sm font-medium">Estado</label>
      <select name="estado" class="input-field" required>
        <option value="pendiente" {% if pedido.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
        <option value="procesando" {% if pedido.estado == 'procesando' %}selected{% endif %}>En Proceso</option>
        <option value="enviado" {% if pedido.estado == 'enviado' %}selected{% endif %}>Enviado</option>
        <option value="entregado" {% if pedido.estado == 'entregado' %}selected{% endif %}>Entregado</option>
        <option value="cancelado" {% if pedido.estado == 'cancelado' %}selected{% endif %}>Cancelado</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium">Transportista</label>
      <input type="text" name="transportista" value="{{ pedido.transportista }}" class="input-field">
    </div>

    <div>
      <label class="block text-sm font-medium">Número de Seguimiento</label>
      <input type="text" name="numero_seguimiento" value="{{ pedido.numero_seguimiento }}" class="input-field">
    </div>

    <div class="md:col-span-2">
      <label class="block text-sm font-medium">Notas</label>
      <textarea name="notas" class="input-field">{{ pedido.notas }}</textarea>
    </div>

    <div class="md:col-span-2 text-right space-x-2">
      <button type="submit" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded">Actualizar</button>
      <a href="/pedidos/{{ pedido.id }}/" class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 inline-block">
        Ver detalle
      </a>
    </div>
  </form>
</div>

<style>
  .input-field { margin-top:0.25rem; width:100%; border:1px solid #d1d5db; border-radius:0.5rem; padding:0.5rem 1rem; outline:none; }
  .input-field:focus { border-color:#a855f7; box-shadow:0 0 0 2px rgba(168,85,247,0.3); }
</style>
</body>
</html>
