<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Venta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-6">
    <a href="/ventas" 
       class="inline-flex items-center px-4 py-2 bg-red-500 text-white rounded-lg shadow hover:bg-red-600 transition">
      ← Volver al listado
    </a>
  </div>

  <h1 class="text-3xl font-bold text-red-600 mb-6">Editar Venta</h1>

  {% if success %}
  <div class="mb-4 p-3 bg-green-100 text-green-700 rounded">
    <strong>✅ Venta actualizada</strong>
  </div>
  {% endif %}

  <form action="/ventas/{{ venta.id }}/edit/" method="post"
        class="grid md:grid-cols-2 gap-6 bg-white p-6 rounded shadow">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium">Cliente</label>
      <input type="text" value="{{ venta.cliente.nombre }}" class="input-field" readonly>
    </div>

    <div>
      <label class="block text-sm font-medium">Vendedor</label>
      <input type="text" value="{{ venta.vendedor.get_full_name }}" class="input-field" readonly>
    </div>

    <div>
      <label class="block text-sm font-medium">Total Venta</label>
      <input type="number" name="total_venta" value="{{ venta.total_venta }}" step="0.01" class="input-field" required>
    </div>

    <div>
      <label class="block text-sm font-medium">Comisión Vendedor</label>
      <input type="number" name="comision_vendedor" value="{{ venta.comision_vendedor }}" step="0.01" class="input-field">
    </div>

    <div class="md:col-span-2">
      <label class="block text-sm font-medium">Descripción</label>
      <textarea name="descripcion" class="input-field">{{ venta.descripcion }}</textarea>
    </div>

    <div class="md:col-span-2 text-right space-x-2">
      <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded">Actualizar</button>
      <a href="/ventas/{{ venta.id }}/" class="px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 inline-block">
        Ver detalle
      </a>
    </div>
  </form>
</div>

<style>
  .input-field { margin-top:0.25rem; width:100%; border:1px solid #d1d5db; border-radius:0.5rem; padding:0.5rem 1rem; outline:none; }
  .input-field:focus { border-color:#ef4444; box-shadow:0 0 0 2px rgba(239,68,68,0.3); }
</style>
</body>
</html>
