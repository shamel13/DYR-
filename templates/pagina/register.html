<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - DYR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 font-sans">

{% include 'pagina/navbar.html' %}

  <!-- REGISTER FORM -->
  <section class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center mb-6">Crear Cuenta</h2>

      <!-- Mensajes de Django -->
      {% if messages %}
        {% for message in messages %}
          {% if message.tags == 'error' %}
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4">
              <p>{{ message }}</p>
            </div>
          {% elif message.tags == 'success' %}
            <div class="bg-green-100 border-l-4 border-green-500 text-green-700 px-4 py-3 rounded mb-4">
              <p>{{ message }}</p>
            </div>
          {% endif %}
        {% endfor %}
      {% endif %}

      <form action="/auth/register/" method="post" class="space-y-4" onsubmit="return validarFormulario()">
        {% csrf_token %}
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Nombre y Apellido <span class="text-red-500">*</span></label>
          <input type="text" name="name" id="name" required minlength="3" 
                 class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                 placeholder="Tu nombre completo"/>
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Tipo de documento <span class="text-red-500">*</span></label>
          <select name="tipo_documento" id="tipo_documento" required
                  class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">Selecciona tipo</option>
            <option value="CC">Cédula de ciudadanía (CC)</option>
            <option value="CE">Cédula de extranjería (CE)</option>
            <option value="NIT">NIT</option>
            <option value="TI">Tarjeta de identidad (TI)</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Número de documento <span class="text-red-500">*</span></label>
          <input type="text" name="numero_documento" id="numero_documento" required minlength="6" 
                 class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                 placeholder="Número de documento"/>
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Teléfono <span class="text-red-500">*</span></label>
          <input type="tel" name="telefono" id="telefono" required minlength="7"
                 class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                 placeholder="10 dígitos (ej: 3001234567)"/>
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email <span class="text-red-500">*</span></label>
          <input type="email" name="email" id="email" required 
                 class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                 placeholder="tu@email.com"/>
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Contraseña <span class="text-red-500">*</span></label>
          <input type="password" name="password" id="password" required minlength="6"
                 class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                 placeholder="Mínimo 6 caracteres, letras y números"/>
        </div>
        <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded font-medium transition">
          Registrarse
        </button>
      </form>

      <p class="text-center text-sm text-gray-600 mt-4">
        ¿Ya tienes cuenta? <a href="/auth/login" class="text-red-500 hover:underline font-semibold">Inicia sesión aquí</a>
      </p>
    </div>
  </section>

  <script>
    function validarFormulario() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const tipoDocumento = document.getElementById('tipo_documento').value;
      const numeroDocumento = document.getElementById('numero_documento').value;
      const telefono = document.getElementById('telefono').value;
      
      if (name.trim().length < 3) {
        alert('El nombre debe tener al menos 3 caracteres');
        return false;
      }

      if (!tipoDocumento) {
        alert('Selecciona el tipo de documento');
        return false;
      }

      if (!numeroDocumento || numeroDocumento.length < 6 || !/^[0-9]+$/.test(numeroDocumento)) {
        alert('Número de documento válido (solo números, mínimo 6 dígitos)');
        return false;
      }

      if (!telefono || telefono.length < 7 || !/^[0-9]+$/.test(telefono)) {
        alert('Teléfono válido (solo números, mínimo 7 dígitos)');
        return false;
      }
      
      if (!email.includes('@')) {
        alert('Ingresa un email válido');
        return false;
      }
      
      const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;
      if (!passwordRegex.test(password)) {
        alert('La contraseña debe tener al menos 6 caracteres e incluir letras y números');
        return false;
      }
      
      return true;
    }
  </script>

</body>
</html>
